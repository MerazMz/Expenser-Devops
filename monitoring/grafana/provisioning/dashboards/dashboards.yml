# Grafana Dashboard Provisioning
# Loads dashboard JSON files from the specified directory

apiVersion: 1

providers:
  - name: "Expenser Dashboards"
    orgId: 1
    folder: "Expenser"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
